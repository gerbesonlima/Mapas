<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Territórios</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

h1{
text-align:center;
margin:20px;
}

/* MENU */

.menu{
background:#2c3e50;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.menu button{
background:#34495e;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.menu button:hover{
background:#1abc9c;
}

/* PAINEL */

.painel-botoes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.botao-painel{
display:flex;
align-items:center;
justify-content:center;
background:#34495e;
color:white;
text-decoration:none;
padding:20px;
border-radius:10px;
font-size:18px;
transition:0.3s;
}

.botao-painel:hover{
background:#1abc9c;
transform:scale(1.05);
}

/* GRUPOS */

.grupo{
display:none;
margin:20px;
}

.grupo.ativo{
display:block;
}

.grupo h2{
background:#2c3e50;
color:white;
padding:10px;
border-radius:6px;
}

/* GRID MAPAS */

.grade{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
margin-top:20px;
}

/* MAPA */

.mapa-container{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.mapa{
width:100%;
height:196px;
overflow:hidden;
border-radius:6px;
}

.mapa iframe{
width:100%;
height:260px;
border:0;
margin-top:-60px;
}

/* INFO */

.info{
margin-top:10px;
}

.info label{
display:block;
margin-top:6px;
}

.info input{
width:100%;
padding:5px;
}

</style>

</head>

<body>

<h1>Controle de Territórios</h1>

<!-- MENU -->

<div class="menu">

<button onclick="mostrarGrupo('painel')">Painel</button>

<button onclick="mostrarGrupo('grupo1')">Grupo 01</button>
<button onclick="mostrarGrupo('grupo2')">Grupo 02</button>
<button onclick="mostrarGrupo('grupo3')">Grupo 03</button>
<button onclick="mostrarGrupo('grupo4')">Grupo 04</button>
<button onclick="mostrarGrupo('grupo5')">Grupo 05</button>
<button onclick="mostrarGrupo('grupo6')">Grupo 06</button>

</div>

<!-- PAINEL -->

<div id="painel" class="grupo ativo">

<h2>Painel</h2>

<div class="painel-botoes">

<a href="relatorio.html" class="botao-painel">
📊 Relatórios
</a>

<a href="territorios.html" class="botao-painel">
🗺️ Territórios
</a>

<a href="estatisticas.html" class="botao-painel">
📈 Estatísticas
</a>

<a href="configuracoes.html" class="botao-painel">
⚙️ Configurações
</a>

<a href="#" class="botao-painel">
➕ Nova Página
</a>

</div>

</div>

<!-- GRUPO 01 -->

<div id="grupo1" class="grupo">

<h2>Grupo 01 - Saída do Salão do Reino</h2>

<div class="grade">

<div class="mapa-container">

<div class="mapa">
<iframe src="https://www.google.com/maps/d/embed?mid=1mRVFDVMXGNd_iR2tw6ae7uP4Q7Cya78&ehbc=2E312F"></iframe>
</div>

<div class="info">

<label>Designado para:</label>
<input type="text">

<label>Aberto em:</label>
<input type="date">

<label>Fechado em:</label>
<input type="date">

</div>

</div>

</div>

</div>

<!-- GRUPO 02 -->

<div id="grupo2" class="grupo">

<h2>Grupo 02 - Saída casa do Robson</h2>

<div class="grade">

<div class="mapa-container">

<div class="mapa">
<iframe src="https://www.google.com/maps/d/embed?mid=1r6jF2LI2ux7isdXChAk4B4nROMWCICg&hl=pt-BR&ehbc=2E312F"></iframe>
</div>

<div class="info">

<label>Designado para:</label>
<input type="text">

<label>Aberto em:</label>
<input type="date">

<label>Fechado em:</label>
<input type="date">

</div>

</div>

</div>

</div>

<!-- SCRIPT -->

<script>

function mostrarGrupo(id){

let grupos = document.querySelectorAll(".grupo")

grupos.forEach(g => {
g.classList.remove("ativo")
})

document.getElementById(id).classList.add("ativo")

}

</script>

</body>

</html>
